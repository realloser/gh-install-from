name: Pull Request

on:
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/**'
      - '!.github/workflows/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
          cache: true

      - name: Verify dependencies
        run: go mod verify

      - name: Check formatting
        run: |
          if [ -n "$(go fmt ./...)" ]; then
            echo "Code is not properly formatted. Run 'go fmt ./...'"
            exit 1
          fi

      - name: Run linters
        uses: golangci/golangci-lint-action@v3
        with:
          version: latest
          args: --timeout=5m

      - name: Run tests
        run: make test

  build-test:
    name: Build Test
    needs: validate
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
          cache: true

      - name: Build
        run: make build

      - name: Test binary
        shell: bash
        run: |
          ./gh-install-from --version
          ./gh-install-from --help

  size:
    name: Size Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
          cache: true

      - name: Build for size check
        run: make build

      - name: Check binary size
        run: |
          size=$(stat -f%z gh-install-from 2>/dev/null || stat -c%s gh-install-from)
          echo "Binary size: $size bytes"
          if [ "$size" -gt 10485760 ]; then
            echo "Binary size exceeds 10MB limit"
            exit 1
          fi

  security:
    name: Security Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
          cache: true

      - name: Run gosec
        uses: securego/gosec@master
        with:
          args: ./...

      - name: Run nancy
        run: |
          go list -json -deps ./... | nancy sleuth

  summary:
    name: Summary
    needs: [validate, build-test, size, security]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check job status
        run: |
          if [ "${{ needs.validate.result }}" != "success" ] || \
             [ "${{ needs.build-test.result }}" != "success" ] || \
             [ "${{ needs.size.result }}" != "success" ] || \
             [ "${{ needs.security.result }}" != "success" ]; then
            echo "Some checks failed. Please review the job logs."
            exit 1
          fi
          echo "All checks passed successfully!" 