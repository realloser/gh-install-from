name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
          
      - name: Build
        run: |
          go build -v -o gh-install-from
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: gh-install-from
          generate_release_notes: true 